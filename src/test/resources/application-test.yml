# Test Configuration
spring:
  application:
    name: kafka-consumer-test
  profiles:
    active: test

kafka:
  broker:
    servers: ${kafka.bootstrap.servers:localhost:9092}
  consumer:
    group-id: kafka-consumer-test-group
    auto-offset-reset: earliest
    enable-auto-commit: true
  topics:
    input-topic: test-input-messages
    error-topic: test-error-messages
    retry-topic: test-retry-messages
  retry:
    attempts: 2
    backoff-delay: 500

logging:
  level:
    com.kafka.consumer: DEBUG
    org.springframework.kafka: DEBUG
    org.apache.kafka: WARN
    org.testcontainers: INFO
